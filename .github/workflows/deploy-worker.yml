# 可选：在 GitHub 云端部署 Worker（本机无需 Node.js）
# 使用前在 GitHub 仓库 Settings → Secrets 添加：
#   CLOUDFLARE_API_TOKEN
#   （Cloudflare → My Profile → API Tokens，需 Workers Scripts Edit + KV 权限）

name: Deploy Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "worker.js"
      - "wrangler.worker.toml"
      - "index.html"
      - "js/**"
      - "css/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to workers.dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm install

      - name: Deploy Worker
        run: npm run deploy:worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
