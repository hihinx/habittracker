# Worker 专用配置 → 部署到 habittracker.freyachou.workers.dev
# 用法: npx wrangler deploy -c wrangler.worker.toml

name = "habittracker"
main = "worker.js"
compatibility_date = "2024-08-01"

[assets]
directory = "."
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

[[kv_namespaces]]
binding = "HABIT_STATE"
id = "a1dbf08920e34076856ee32b27f136fb"
